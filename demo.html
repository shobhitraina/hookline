const FIRST=["Aarav","Vivaan","Aditya","Vihaan","Arjun","Reyansh","Krishna","Ishaan","Rohan","Kabir","Ramesh","Suresh","Mahesh","Priya","Ananya","Diya","Saanvi","Aadhya","Riya","Anika","Meera","Kavya","Lakshmi","Pooja","Deepak","Vikram","Sanjay","Ravi","Anil","Manoj","Geeta","Sunita","Rekha","Vasavi","Chinmayee","Faseeh","Mehul","Prasanta","Karthik","Devaraj"];
const LAST=["Sharma","Verma","Reddy","Nair","Iyer","Rao","Gupta","Mehta","Patel","Shah","Bhat","Kumar","Singh","Das","Menon","Pillai","Joshi","Khatri","Boruah","Babu",""];

function genData(indKey){
 const cfg=INDUSTRIES[indKey];const r=rng(hash(indKey)+7);
 const ads=cfg.ads.map((a,i)=>({id:'ad'+i,...a,spend:0,leads:0,conv:0,hook:+(6+r()*18).toFixed(1),ret:+(15+r()*14).toFixed(1),ctr:+(0.5+r()*2.2).toFixed(2),y_leads:0,p_leads:0}));
 const reps=cfg.reps;
 const leads=[];const N=58;
 const now=Date.now();
 for(let i=0;i<N;i++){
   const fn=pick(r,FIRST),ln=pick(r,LAST);const name=(fn+' '+ln).trim();
   const daysAgo=Math.floor(r()*30);const created=now-daysAgo*86400000-Math.floor(r()*86400000);
   // status distribution
   const sroll=r();let status;
   if(sroll<0.15)status="Converted";else if(sroll<0.27)status="Did Not Pick";else if(sroll<0.37)status="Potential";
   else if(sroll<0.44)status="Call Back Later";else if(sroll<0.50)status="Need Demo";else if(sroll<0.56)status="Neutral";
   else if(sroll<0.61)status="Not Reachable";else if(sroll<0.67)status="New";else if(sroll<0.73)status="Cold";
   else if(sroll<0.80)status="Said No";else if(sroll<0.86)status="Different City";else if(sroll<0.92)status="Language";else status="Bad Lead";
   const organic=r()<0.12;const ad=organic?null:ads[Math.floor(r()*ads.length)];
   const attempts=status==="New"?0:1+Math.floor(r()*4);
   const rating=(["Potential","Need Demo","Converted"].includes(status))?(3+Math.floor(r()*3)):(r()<0.4?0:1+Math.floor(r()*3));
   // callbacks only for workable, non-New leads. Mix of overdue (negative), due-today (small +),
   // and future-day (large +) so leads split naturally between Live and Waiting.
   let cbMin=null;
   if(status!=="New"&&WORKABLE.includes(status)&&r()<0.72){cbMin=Math.floor(r()*4300)-1300;}
   const lead={
     id:'ld'+i,name,phone:'9'+(100000000+Math.floor(r()*899999999)),created,status,rating,attempts,
     city:pick(r,cfg.cities),age:r()<0.15?null:35+Math.floor(r()*40),
     forr:pick(r,cfg.fors),plan:r()<0.5?'Unknown':pick(r,cfg.plans),goal:pick(r,cfg.goals),
     rep:pick(r,reps),adId:ad?ad.id:null,adName:ad?ad.n:null,platform:ad?ad.p:(r()<0.5?'ig':'direct'),
     notes:Math.floor(r()*4),callbackMin:cbMin,
     comments:[],calls:[]
   };
   if(ad){ad.leads++;if(status==="Converted")ad.conv++;ad.spend+=Math.round(200+r()*1400);if(daysAgo<7)ad.y_leads++;else if(daysAgo<14)ad.p_leads++;}
   // calls + comments + AI transcripts
   if(attempts>0){
     const nc=Math.min(attempts,1+Math.floor(r()*2));
     for(let c=0;c<nc;c++){lead.calls.push(makeCall(r,lead,ad,cfg,status,c===0));}
     lead.comments.push({t:commentFor(status),by:lead.rep,when:created+3600000});
   }
   leads.push(lead);
 }
 // give unattributed ads some spend baseline
 ads.forEach(a=>{if(a.spend===0)a.spend=Math.round(300+r()*1200);});
 // orders from converted
 const orders=leads.filter(l=>l.status==="Converted").map((l,i)=>({
   id:'ORD'+(1000+i),lead:l,amount:({Individual:1500,Duo:2000,Family:2500,Starter:999,Pro:1799,Single:799,Routine:1499,Bundle:1999,Consult:500,Package:8000,Premium:15000,Subscription:1299}[l.plan]||1500),
   status:r()<0.75?"Success":"Created",connected:r()<0.6,when:l.created+ (2+Math.floor(r()*6))*86400000
 }));
 // checkout attempts (synthetic, mostly abandoned)
 const checkouts=[];const fields=["name","email","phone","address","city","plan","billingCycle","agreedToTerms"];
 for(let i=0;i<22;i++){
   const done=1+Math.floor(r()*(fields.length-1)); // 1..total-1 — never all fields (those become orders)
   checkouts.push({id:randId(r),name:r()<0.4?null:(pick(r,FIRST)+' '+pick(r,LAST)).trim(),
     status:r()<0.6?"Abandoned":"Partially Abandoned",
     done, total:fields.length, survey:r()<0.25, ad:pick(r,ads),
     startedMin:Math.floor(r()*2880)});
 }
 // dup groups
 const dups=[];
 for(let g=0;g<6;g++){const ph='+91'+(7000000000+Math.floor(r()*2999999999));const cnt=2+Math.floor(r()*3);
   const fn=pick(r,FIRST);const grp=[];for(let k=0;k<cnt;k++){grp.push({name:(k%2?fn+' '+pick(r,LAST):fn),status:pick(r,STATUSES),owner:pick(r,reps).toLowerCase(),calls:Math.floor(r()*3),comments:Math.floor(r()*4),created:now-Math.floor(r()*120)*86400000,source:r()<0.5?'ig':'fb'});}
   dups.push({phone:ph,leads:grp});}
 return {cfg,ads,reps,leads,orders,checkouts,dups,indKey};
}
function hash(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))>>>0;return h;}
function randId(r){const a="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz0123456789";let s="";for(let i=0;i<8;i++)s+=a[Math.floor(r()*a.length)];return s;}
function commentFor(s){return ({"Converted":"Confirmed, sending payment link","Did Not Pick":"dnp","Potential":"Interested, wants a callback","Call Back Later":"Asked to call back later","Need Demo":"Wants a demo session","Said No":"Not interested right now","Cold":"Cold, no urgency"}[s])||"Logged outcome";}

function makeCall(r,lead,ad,cfg,status,latest){
 const sent=status==="Converted"||status==="Potential"||status==="Need Demo"?"POSITIVE":(["Said No","Bad Lead","Cold"].includes(status)?"NEGATIVE":"NEUTRAL");
 const adref=ad?ad.n.replace(/^\d+_/,'').split('|')[0].trim():"an organic enquiry";
 const sum=`Sales rep followed up with ${lead.name.split(' ')[0]} who came in via ${adref}. ${sent==='POSITIVE'?'Strong intent, moving toward booking.':(sent==='NEGATIVE'?'Low intent or not the right fit right now.':'Mild interest, needs nurturing.')}`;
 const kp=[
   `Came in through ${ad?ad.p.toUpperCase()+' creative "'+adref+'"':'an organic visit'} and recalled the ${cfg.brand} offer.`,
   sent==='POSITIVE'?`Asked about pricing, ${lead.plan==='Unknown'?'plans':lead.plan+' plan'} and how onboarding works.`:`Was busy / partially engaged; agent re-pitched the core value.`,
   `Based in ${lead.city}; ${lead.forr==='Self'?'buying for themselves':'buying for '+lead.forr.toLowerCase()}.`,
 ];
 const concerns=sent==='POSITIVE'?[`Wanted to confirm delivery/visit timeline before paying.`]:[`Limited time on call`,`Did not strongly recall the enquiry`];
 const next=sent==='POSITIVE'?[`Send payment link on WhatsApp`,`Schedule onboarding once paid`]:[`Send a short product video`,`Call back after they review it`];
 return {sent,lang:"English",sum,kp,concerns,next,when:lead.created+ (1+Math.floor(r()*5))*3600000, by:lead.rep};
}

function leadRow(l,reps){

 const cb=l.callbackMin==null?`<button class="cbtn" style="border:1px solid var(--line);color:#64748b" onclick="event.stopPropagation();openFocus('${l.id}')">Set time</button>`:

 const statusSel=`<select class="statussel" style="background:${bg};color:${fg}" onclick="event.stopPropagation()" onchange="setStatus('${l.id}',this.value)">${STATUSES.map(s=>`<option ${s===l.status?'selected':''}>${s}</option>`).join('')}</select>`;
 const assignSel=`<select class="assignsel" onclick="event.stopPropagation()" onchange="setRep('${l.id}',this.value)">${reps.map(rp=>`<option ${rp===l.rep?'selected':''}>${rp}</option>`).join('')}</select>`;
 return `<tr onclick="openFocus('${l.id}')" style="cursor:pointer">

function fmtCb(m){if(m<0){const h=Math.round(-m/60);return h>=24?'-'+Math.round(h/24)+'d':'-'+h+'h';}const h=Math.round(m/60);if(m<60)return '+'+m+'m';if(h<24)return '+'+h+'h';return h<48?'next day':'+'+Math.round(h/24)+'d';}

function rAnalytics(){

 const days={week:7,month:30,year:365}[anRange];
 const cutoff=Date.now()-days*86400000;
 const ls=DB.leads.filter(l=>l.created>=cutoff);
 const byCity=tally(ls.map(l=>l.city));const byPlan=tally(ls.map(l=>l.plan));const byAge=ageTally(ls);
 const range=['week','month','year'].map(k=>`<button class="pill ${anRange===k?'on':''}" onclick="anRange='${k}';render()">Last ${k[0].toUpperCase()+k.slice(1)}</button>`).join('');
 return `<div class="btw" style="margin-bottom:14px"><div></div><div class="pills">${range}</div></div>
   <div class="row"><div style="flex:1;min-width:280px">${barCard('Leads by City',byCity,'#4F46E5')}</div>
   <div style="flex:1;min-width:280px">${barCard('Leads by '+(DB.cfg.concern==='goal'?'Goal':'Concern'),tally(ls.map(l=>l.goal)),'#8B5CF6')}</div>
   <div style="flex:1;min-width:280px">${barCard('Leads by Age',byAge,'#16A34A')}</div></div>
   <div class="card" style="margin-top:16px"><div class="ch">Lead acquisition trend</div><div class="sec-sub">Total leads in selected period: ${ls.length}</div>${trendBars(ls,days)}</div>`;
}
function tally(a){const m={};a.forEach(x=>{x=x||'Unknown';m[x]=(m[x]||0)+1;});return Object.entries(m).sort((x,y)=>y[1]-x[1]).slice(0,7);}
function ageTally(ls){const b={'Under 18':0,'18-24':0,'25-34':0,'35-44':0,'45-54':0,'55+':0,'Unknown':0};ls.forEach(l=>{const a=l.age;if(a==null)b['Unknown']++;else if(a<18)b['Under 18']++;else if(a<25)b['18-24']++;else if(a<35)b['25-34']++;else if(a<45)b['35-44']++;else if(a<55)b['45-54']++;else b['55+']++;});return Object.entries(b).filter(e=>e[1]>0);}
function barCard(title,data,col){const mx=Math.max(1,...data.map(d=>d[1]));return `<div class="card"><div class="ch">${title}</div><div style="margin-top:12px">${data.map(d=>`<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;font-size:12.5px"><span>${esc(d[0])}</span><b>${d[1]}</b></div><div class="ft" style="height:10px;margin-top:3px"><div class="ff" style="width:${Math.round(d[1]/mx*100)}%;background:${col}"></div></div></div>`).join('')||'<span class=muted>No data</span>'}</div></div>`;}
function trendBars(ls,days){const n=Math.min(days,30);const arr=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);const nx=new Date(d);nx.setDate(d.getDate()+1);arr.push(ls.filter(l=>l.created>=d.getTime()&&l.created<nx.getTime()).length);}const mx=Math.max(1,...arr);return `<div style="display:flex;align-items:flex-end;gap:3px;height:120px;margin-top:14px">${arr.map(v=>`<div style="flex:1;background:#818CF8;border-radius:3px 3px 0 0;height:${Math.round(v/mx*100)}%;min-height:${v?3:0}px"></div>`).join('')}</div>`;}

let laGroup='ad';let laOpen={};
function aggGroup(leads,ads){
 const uniq={};(ads||[]).forEach(a=>{if(a)uniq[a.id]=a;});const adsArr=Object.values(uniq);
 const spend=adsArr.reduce((s,a)=>s+Number(a.spend||0),0);
 const total=leads.length;const conv=leads.filter(l=>l.status==='Converted').length;
 const avg=arr=>arr.length?arr.reduce((x,y)=>x+y,0)/arr.length:null;
 const counts={};leads.forEach(l=>counts[l.status]=(counts[l.status]||0)+1);
 return{spend,total,conv,cpl:total?spend/total:null,cpc:conv?spend/conv:null,
   hook:avg(adsArr.map(a=>a.hook).filter(v=>v!=null)),ret:avg(adsArr.map(a=>a.ret).filter(v=>v!=null)),ctr:avg(adsArr.map(a=>a.ctr).filter(v=>v!=null)),
   convPct:total?conv/total*100:0,counts};
}

 const cp=a.convPct;
 return `<td>${a.spend?inr(a.spend):'—'}</td><td>${a.cpl!=null?inr(a.cpl):'—'}</td><td>${a.cpc!=null?inr(a.cpc):'—'}</td>
  <td><b>${a.total}</b></td><td>${a.total?`<span class="heat" style="background:${cp>=20?'#DCFCE7':cp>=8?'#FEF9C3':'#F1F5F9'};color:${cp>=20?'#15803D':cp>=8?'#A16207':'#64748b'}">${cp.toFixed(1)}%</span>`:'—'}</td>
  ${ST_SHORT.map(s=>{const v=a.counts[s[0]]||0;return `<td style="${v?(POS.has(s[0])?'background:#F0FDF4;color:#15803D;font-weight:700':NEG.has(s[0])?'background:#FEF2F2;color:#B91C1C;font-weight:700':'font-weight:600'):'color:#CBD5E1'}">${v||'—'}</td>`;}).join('')}`;
}

 }else{ // flat grouping

   order.sort((a,b)=>groups[b].leads.length-groups[a].leads.length);

function heat(v,lo,hi,suf){const t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));const bg=`hsl(${48-t*8},${70+t*15}%,${92-t*30}%)`;const fg=t>0.55?'#92400E':'#A16207';return `<span class="heat" style="background:${bg};color:${fg}">${v}${suf}</span>`;}

   <div style="flex:1;min-width:260px" class="card"><div class="ch" style="color:#16A34A">📈 Picking up</div><div class="sec-sub">Highest WoW gain (min 3 leads)</div>${cardList(up,'#16A34A','No risers yet.')}</div>
   <div style="flex:1;min-width:260px" class="card"><div class="ch" style="color:#DC2626">📉 Stopped performing</div><div class="sec-sub">Silent or down 50%+ from last week</div>${cardList(down,'#DC2626','Nothing dropped off.')}</div>
   <div style="flex:1;min-width:260px" class="card"><div class="ch" style="color:#4F46E5">✨ New this week</div><div class="sec-sub">First-ever leads in last 7 days</div>${cardList(nw,'#4F46E5','No new creatives.')}</div></div>`;
 const rows=ads.sort((a,b)=>b.last7-a.last7).map(x=>{const spark=sparkline(x.a.id);return `<tr>
   <td style="max-width:260px"><div style="font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(x.a.n.replace(/^\d+_/,''))}</div><div style="font-size:11px;color:#94A3B8">${x.a.p} · ${esc(x.a.camp)}</div></td>
   <td><span class="badge" style="background:#D1FAE5;color:#047857">● Active</span></td>
   <td>${x.last7}</td><td>${spark}</td>
   <td style="font-weight:700;color:${x.delta>=0?'#16A34A':'#DC2626'}">${x.delta===999?'new':(x.delta>=0?'+':'')+x.delta+'%'}</td>
   <td>${x.qualPct}%</td><td>${x.convPct}%</td><td class="muted">${x.last7?'today':'—'}</td></tr>`;}).join('');
 return cards+`<div class="muted" style="font-size:12.5px;margin-bottom:8px">${DB.ads.length} creatives with activity</div><div class="twrap"><table class="tbl">
   <tr><th>Creative</th><th>Status</th><th>7d</th><th>14d trend</th><th>Δ vs prior 7d</th><th>Qualified %</th><th>Conv %</th><th>Last lead</th></tr>${rows}</table></div>`;
}
function sparkline(id){const r=rng(hash(id));const pts=[];for(let i=0;i<14;i++)pts.push(r()*100);const w=70,h=22,step=w/13;const d=pts.map((v,i)=>`${(i*step).toFixed(1)},${(h-v/100*h).toFixed(1)}`).join(' ');return `<svg class="spark" width="${w}" height="${h}"><polyline points="${d}" fill="none" stroke="#16A34A" stroke-width="1.5"/></svg>`;}

/* ---------- CREATIVE DASHBOARD ---------- */
function rCreativeDash(){
 setTop('Creative Dashboard','Meta Ads · per-creative performance');
 const totalSpend=DB.ads.reduce((s,a)=>s+a.spend,0);const totalLeads=DB.leads.filter(l=>l.adId).length;
 let kpi=`<div class="kpis" style="grid-template-columns:repeat(4,1fr)">
   ${kpiCard('Total ads',DB.ads.length,DB.ads.length+' active')}${kpiCard('Total spend',inr(totalSpend),'')}
   ${kpiCard('Total leads',totalLeads,'')}${kpiCard('Avg CPL',inr(totalLeads?totalSpend/totalLeads:0),'')}</div>`;
 const rows=DB.ads.map((a,i)=>{const lc=DB.leads.filter(l=>l.adId===a.id);const conv=lc.filter(l=>l.status==='Converted').length;const cpl=lc.length?a.spend/lc.length:null;const cpc=conv?a.spend/conv:null;
   return `<tr><td class="muted">${i+1}</td>
   <td style="max-width:280px"><div style="font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.n)}</div><div style="font-size:11px;color:#94A3B8">${esc(a.camp)} · ${a.f}</div></td>
   <td><span class="badge" style="background:#D1FAE5;color:#047857">● Active</span></td>
   <td>${pill2(a.ctr,1,2,'%')}</td><td>${pill2(a.hook,8,16,'%')}</td><td>${pill2(a.ret,15,22,'%')}</td>
   <td><b>${lc.length}</b></td><td>${cpl!=null?costPill(cpl):'—'}</td><td>${conv}</td><td>${cpc!=null?costPill(cpc):'—'}</td></tr>`;}).join('');
 return kpi+`<div class="btw" style="margin:6px 0 12px"><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="muted" style="font-size:11px;align-self:center">ADD COLUMN:</span>${['Spend','Impressions','Reach','Hook Rate','Avg Watch','CPM'].map(c=>`<span class="cbk">+ ${c}</span>`).join('')}</div>
   <div style="display:flex;gap:6px"><span class="pill on">All types</span><span class="pill">Video</span><span class="pill">Static</span></div></div>
   <div class="twrap"><table class="tbl">
   <tr><th>#</th><th>Ad name</th><th>Status</th><th>CTR %</th><th>Hook %</th><th>Retention %</th><th>Leads (WL)</th><th>CPL (WL)</th><th>Conv (WL)</th><th>CPC (WL)</th></tr>${rows}</table></div>`;
}
function pill2(v,lo,hi,suf){const good=v>=hi,mid=v>=lo;const bg=good?'#D1FAE5':mid?'#FEF9C3':'#FEE2E2';const fg=good?'#047857':mid?'#A16207':'#B91C1C';return `<span class="heat" style="background:${bg};color:${fg}">${v}${suf}</span>`;}
function costPill(v){const good=v<400;return `<span class="heat" style="background:${good?'#D1FAE5':v<900?'#FEF9C3':'#FEE2E2'};color:${good?'#047857':v<900?'#A16207':'#B91C1C'}">${inr(v)}</span>`;}

/* ---------- AD LIBRARY ---------- */
function rAdLibrary(){
 setTop('Ad Library','Ad-creative videos with their AI description and the utm_content they run as');
 const cards=DB.ads.map(a=>`<div class="adcard"><div class="adthumb"><span class="fmt">${a.f}</span>🎬</div>
   <div class="b"><div class="t">${esc(a.n)}</div><div class="d">${esc(a.desc)}</div>
   <div style="display:flex;gap:12px;margin-top:9px;font-size:12px"><a style="color:#4F46E5;font-weight:600;cursor:pointer">View description</a></div>
   <div style="font-size:10.5px;color:#94A3B8;margin-top:7px">${a.p} · ${esc(a.camp)}</div></div></div>`).join('');
 return banner('Every ad is decoded by AI frame-by-frame into this description — the source of truth that joins each creative to its leads and conversions.')+
   `<div class="btw" style="margin-bottom:14px"><div class="muted">${DB.ads.length} videos</div><button class="btn pri">⬆ Upload videos</button></div><div class="adgrid">${cards}</div>`;
}

/* ---------- DUPLICATE REVIEW ---------- */
function rDuplicates(){
 setTop('Duplicate Review','Leads sharing a phone number — pick the one to keep and merge, or dismiss');
 const groups=DB.dups.map((g,gi)=>{const rows=g.leads.map((l,i)=>{const[fg,bg]=ST_COL[l.status]||['#475569','#F1F5F9'];
   return `<tr><td><input type="radio" name="dup${gi}" ${i===0?'checked':''}></td><td><b>${esc(l.name)}</b></td>
   <td><span class="badge" style="background:${bg};color:${fg}">${l.status}</span></td><td style="font-size:12px">${l.owner}</td><td>${l.calls}</td><td>${l.comments}</td><td style="font-size:12px;color:#64748b">${new Date(l.created).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</td><td><span class="badge" style="background:#F1F5F9;color:#475569">${l.source}</span></td></tr>`;}).join('');
   return `<div class="dupg"><div class="gh"><span>${g.phone}</span><span class="muted">${g.leads.length} leads</span></div>
   <table class="tbl"><tr><th>Keep</th><th>Name</th><th>Status</th><th>Owner</th><th>Calls</th><th>Comments</th><th>Created</th><th>Source</th></tr>${rows}</table>
   <div style="display:flex;justify-content:flex-end;gap:8px;padding:10px 14px"><button class="btn sm">Not duplicates</button><button class="btn pri sm">Merge ${g.leads.length-1} into keeper</button></div></div>`;}).join('');
 return `<div class="muted" style="margin-bottom:14px"><b>${DB.dups.length} groups</b> to review</div>${groups}`;
}

/* ---------- banner ---------- */
function banner(t){return `<div class="banner">✨ ${t}</div>`;}

/* ---------- BOOT ---------- */
function buildIndSel(){const s=document.getElementById('indSel');s.innerHTML=Object.keys(INDUSTRIES).map(k=>`<option value="${k}">${INDUSTRIES[k].brand} — ${IND_LABELS[k]}</option>`).join('');s.value=curInd;s.onchange=()=>{curInd=s.value;load();render();};}
try{const n=JSON.parse(localStorage.getItem('hldemo_nav')||'null');if(n){if(n.ind&&INDUSTRIES[n.ind])curInd=n.ind;if(n.route)route=n.route;}}catch(e){}
buildIndSel();load();render();
